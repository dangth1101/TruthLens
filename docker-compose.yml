version: "3.8"

services:
  db:
    image: postgres:18.3
    container_name: my_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: truthlens
      POSTGRES_PASSWORD: truthlens
      POSTGRES_DB: truthlens_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
